<!DOCTYPE html>
<html>

<head>
    <title>Full App</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Barcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>

<body>

<!-- ================= LOGIN / REGISTER ================= -->
<div id="auth">

    <h2>User Registration</h2>
    <input type="email" id="reg_email" placeholder="Email"><br><br>
    <input type="password" id="reg_pass" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>

    <hr>

    <h2>User Login</h2>
    <input type="email" id="log_email" placeholder="Email"><br><br>
    <input type="password" id="log_pass" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

</div>


<!-- ================= PRODUCT PAGE ================= -->
<div id="productPage" style="display:none;">

    <h2>Product Entry</h2>

    <button onclick="logout()">Logout</button><br><br>

    <input id="id" placeholder="Product ID"><br><br>
    <input id="name" placeholder="Product Name"><br><br>
    <input id="price" placeholder="Price"><br><br>

    <button onclick="createProduct()">Save Product</button>

    <h3>Generated Barcode</h3>
    <svg id="barcode"></svg>

</div>


<script>

// 🔗 SUPABASE
const client = supabase.createClient(
    "https://eyekpbzcdouhkquqjjae.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5ZWtwYnpjZG91aGtxdXFqamFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQyMjYsImV4cCI6MjA5MDAxMDIyNn0.AqvbWC_8Y_D3aKpafiGZKS2DOZTNJ9-DM0s2IjlJTps"
);

// 🔄 CHECK SESSION ON LOAD
const user = JSON.parse(localStorage.getItem("user"));
if (user) {
    showProductPage();
}

// ================= REGISTER =================
async function register() {
    const email = reg_email.value;
    const password = reg_pass.value;

    const { error } = await client.from("users").insert([
        { email, password, approved: false }
    ]);

    msg.innerText = error
        ? error.message
        : "Registered! Wait for admin approval.";
}

// ================= LOGIN =================
async function login() {
    const email = log_email.value;
    const password = log_pass.value;

    const { data, error } = await client
        .from("users")
        .select("*")
        .eq("email", email)
        .eq("password", password)
        .single();

    if (error || !data) {
        msg.innerText = "Invalid credentials";
        return;
    }

    if (!data.approved) {
        msg.innerText = "Not approved by admin";
        return;
    }

    // SAVE SESSION
    localStorage.setItem("user", JSON.stringify(data));

    showProductPage();
}

// ================= SHOW PRODUCT PAGE =================
function showProductPage() {
    document.getElementById("auth").style.display = "none";
    document.getElementById("productPage").style.display = "block";
}

// ================= LOGOUT =================
function logout() {
    localStorage.removeItem("user");
    location.reload();
}

// ================= ADD PRODUCT =================
async function createProduct() {
    const id = document.getElementById("id").value;
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;

    if (!id || !name) {
        alert("Enter ID & Name");
        return;
    }

    // Generate Barcode
    JsBarcode("#barcode", id, {
        format: "CODE128",
        displayValue: true
    });

    const { error } = await client
        .from("products")
        .insert([{
            id,
            name,
            price,
            barcode: id,
            purchased: false
        }]);

    if (error) {
        alert(error.message);
    } else {
        alert("✅ Product Saved!");
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>Scan Product</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Scan Product</h2>

<div id="reader" style="width:350px;"></div>
<h3 id="result"></h3>

<script>
const { createClient } = window.supabase;

const supabaseClient = createClient(
  "https://eyekpbzcdouhkquqjjae.supabase.co",
  "YOUR_NEW_KEY"
);

let lastScanned = "";

// ✅ Scan success
async function onScanSuccess(decodedText) {

  // prevent same scan repeat
  if (decodedText === lastScanned) return;
  lastScanned = decodedText;

  document.getElementById("result").innerHTML = "Scanning: " + decodedText;

  // 🔍 Find product
  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .eq("barcode", decodedText)
    .maybeSingle();

  if (!data) {
    document.getElementById("result").innerHTML = "❌ Product not found";
    return;
  }

  // ✅ Update DB
  const { error: updateError } = await supabaseClient
    .from("products")
    .update({ purchased: true })
    .eq("barcode", decodedText);

  if (updateError) {
    document.getElementById("result").innerHTML = "❌ Update failed";
    return;
  }

  document.getElementById("result").innerHTML = `
    ✅ Purchased <br>
    ${data.name} - ₹${data.price}
  `;
}

// ❌ Ignore errors
function onScanError(err) {}

// Start scanner
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      {
        fps: 15,
        qrbox: { width: 250, height: 120 } // better for barcode
      },
      onScanSuccess,
      onScanError
    );
  }
});
</script>

</body>
</html>

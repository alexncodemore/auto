<script>
const { createClient } = window.supabase;

const supabaseClient = createClient(
  "https://eyekpbzcdouhkquqjjae.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5ZWtwYnpjZG91aGtxdXFqamFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQyMjYsImV4cCI6MjA5MDAxMDIyNn0.AqvbWC_8Y_D3aKpafiGZKS2DOZTNJ9-DM0s2IjlJTps"
);

let lastScanned = "";

// ✅ Scan success
async function onScanSuccess(decodedText) {

  const code = decodedText.trim();

  console.log("SCANNED:", code);

  // prevent duplicate scan
  if (code === lastScanned) return;
  lastScanned = code;

  // 🔍 Find product
  const { data } = await supabaseClient
    .from("products")
    .select("*")
    .eq("barcode", code)
    .maybeSingle();

  if (!data) {
    document.getElementById("result").innerHTML =
      "❌ Not found: " + code;
    return;
  }

  // ✅ Update
  await supabaseClient
    .from("products")
    .update({ purchased: true })
    .eq("barcode", code);

  document.getElementById("result").innerHTML =
    "✅ Purchased: " + data.name;
}

// ignore scan errors
function onScanError(err) {}

// Start scanner
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      {
        fps: 15,
        qrbox: { width: 300, height: 120 } // 🔥 IMPORTANT FIX
      },
      onScanSuccess,
      onScanError
    );
  }
});
</script>

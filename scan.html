<!DOCTYPE html>
<html>

<head>
  <title>Barcode Scanner</title>

  <!-- Barcode Scanner -->
  <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Scan Barcode check</h2>

<div id="scanner" style="width: 400px;"></div>
<h3 id="result"></h3>

<script>
const { createClient } = window.supabase;

const supabaseClient = createClient(
  "https://eyekpbzcdouhkquqjjae.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5ZWtwYnpjZG91aGtxdXFqamFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQyMjYsImV4cCI6MjA5MDAxMDIyNn0.AqvbWC_8Y_D3aKpafiGZKS2DOZTNJ9-DM0s2IjlJTps"
);

// Start Quagga
Quagga.init({
  inputStream: {
    name: "Live",
    type: "LiveStream",
    target: document.querySelector('#scanner'),
    constraints: {
      facingMode: "environment" // back camera
    }
  },
  decoder: {
    readers: ["code_128_reader"] // matches your barcode
  }
}, function(err) {
  if (err) {
    console.log(err);
    return;
  }
  Quagga.start();
});

// When detected
Quagga.onDetected(async function(result) {
  const code = result.codeResult.code;
  document.getElementById("result").innerHTML = "Scanned: " + code;

  // 🔍 Find product
  const { data } = await supabaseClient
    .from("products")
    .select("*")
    .eq("barcode", code)
    .maybeSingle();

  if (!data) {
    document.getElementById("result").innerHTML = "❌ Not found: " + code;
    return;
  }

  // ✅ Update DB
  await supabaseClient
    .from("products")
    .update({ purchased: true })
    .eq("barcode", code);

  document.getElementById("result").innerHTML =
    "✅ Purchased: " + data.name;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>Scan Product</title>

  <!-- Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
    }
    #reader {
      width: 300px;
      margin-bottom: 20px;
    }
    .result {
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Scan Product</h2>

<div id="reader"></div>

<div class="result" id="result"></div>

<script>
const { createClient } = window.supabase;

const supabaseClient = createClient(
  "https://eyekpbzcdouhkquqjjae.supabase.co",
  "YOUR_NEW_KEY"
);

let scanned = false;

// When barcode scanned
async function onScanSuccess(decodedText) {

  if (scanned) return;
  scanned = true;

  // 🔍 Find product
  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .eq("barcode", decodedText)
    .single();

  if (error || !data) {
    document.getElementById("result").innerHTML = "❌ Product not found";
    scanned = false;
    return;
  }

  // ✅ Mark as purchased
  await supabaseClient
    .from("products")
    .update({ purchased: true })
    .eq("barcode", decodedText);

  // 📢 Show result
  document.getElementById("result").innerHTML = `
    ✅ Purchased <br>
    Name: ${data.name} <br>
    Price: ${data.price}
  `;

  // Allow next scan after 3 sec
  setTimeout(() => scanned = false, 3000);
}

// Start scanner
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
  }
});
</script>

</body>
</html>
